<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thực đơn & Ưu đãi – Quê Hương</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Quê Hương</div>
    <nav class="main-menu">
      <a href="index.html">Trang chủ</a>
      <a href="products.html">Thực đơn & Đặt món</a>
      <a href="#">Tin tức & Ưu đãi</a>
      <a href="#">Hệ thống cửa hàng</a>
    </nav>
    <div class="user-area" id="user-area">
      <button id="login-btn">Đăng nhập</button>
      <button id="register-btn">Đăng ký</button>
    </div>
    <div class="cart">
      🛒 <a href="cart.html" style="color:white;">Giỏ hàng (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <main>
    <section class="all-products">
      <h2>Danh sách món ăn & Ưu đãi</h2>
      <div class="product-grid" id="all-products"></div>
    </section>
  </main>

  <footer>
    <p>Quê Hương – Hotline: 0123 456 789 | Email: contact@example.com</p>
    <p>Liên kết mạng xã hội: Facebook | Instagram | Zalo</p>
    <p>Chính sách bảo mật & Điều khoản sử dụng</p>
  </footer>

  <div id="login-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-login">&times;</span>
      <h3>Đăng nhập</h3>
      <form id="login-form">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
      </form>
    </div>
  </div>

  <div id="register-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-register">&times;</span>
      <h3>Đăng ký</h3>
      <form id="register-form">
        <input type="text" placeholder="Họ tên" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Mật khẩu" required>
        <input type="password" placeholder="Nhập lại mật khẩu" required>
        <button type="submit">Đăng ký</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const allProductsEl = document.getElementById('all-products');

    const productsList = [
      {id:1,name:"Phở gà kho",price:50000,img:"phogakho.jpg",date:"2026-04-10"},
      {id:2,name:"Phở bò",price:70000,img:"phobo.png",date:"2026-04-09"},
      {id:3,name:"Bún bò Huế",price:65000,img:"bunbohue.jpg",date:"2026-04-08"},
      {id:4,name:"Cơm gà xối mỡ",price:60000,img:"comgaxoimo.jpg",date:"2026-04-07"},
      {id:5,name:"Cơm sườn",price:70000,img:"comsuon.jpg",date:"2026-04-06"},
      {id:6,name:"Hủ tiếu khô",price:55000,img:"hutieukho.jpg",date:"2026-04-05"}
    ];

    function renderAllProducts() {
      allProductsEl.innerHTML = '';
      productsList.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product-card';
        div.innerHTML = `
          <img src="images/${p.img}" alt="${p.name}">
          <h4>${p.name}</h4>
          <p>Ngày đăng: ${p.date}</p>
          <p>Giá: ${p.price.toLocaleString()}₫</p>
          <button onclick="addToCart(${p.id})">Thêm vào giỏ</button>
        `;
        allProductsEl.appendChild(div);
      });
    }

    renderAllProducts();
  </script>
</body>
</html>
